apiVersion: skaffold/v4beta14
kind: Config
build:
  local:
    push: true
  tagPolicy:
    envTemplate:
      template: "12-06-2026-abbb27k0-4598-development"
  artifacts:
  - image: quantumteknologi/qb-remix-base
    context: .
    custom:
      buildCommand: |
        docker inspect quantumteknologi/qb-remix-base:12-06-2026 > /dev/null && docker tag quantumteknologi/qb-remix-base:12-06-2026 $IMAGE && ( [ "$PUSH_IMAGE" != "true" ] || docker push $IMAGE )
      dependencies:
        paths:
          - '**/*'
          - '.env'
        ignore:
          - '.git/**'
          - 'k8s/**'
          - 'skaffold.yaml'
          - 'node_modules/**'
          - '.skaffold/**'
    sync:
      manual:
        - src: '**/*'
          dest: '/app'
        - src: '.env'
          dest: '/app'

manifests:
  rawYaml:
    - k8s/*.yaml
deploy:
  kubectl: {}
